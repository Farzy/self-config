---
- name: Create test file
  ansible.builtin.template:
    src: templates/test.txt.j2
    dest: /tmp/test.txt
    mode: '0644'

- name: Debugging
  ansible.builtin.debug:
    msg: "Install package {{ item }}..."
  with_items: "{{ test_packages }}"

