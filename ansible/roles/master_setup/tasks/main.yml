- name: Include Debian specific tasks
  ansible.builtin.include_tasks:
    file: debian.yml
    apply:
      tags:
        - debian
  tags:
    - debian

# - name: Install Git config
#   template: src=gitconfig.j2 dest={{ me.home }}/.gitconfig mode="0600" owner=farzy group=farzy
#   tags: configuration

- name: Include Zsh specific tasks
  ansible.builtin.include_tasks:
    file: zsh.yml
    apply:
      tags:
        - zsh
  tags:
    - zsh

- name: Include user configuration tasks
  ansible.builtin.include_tasks:
    file: user-config.yml
    apply:
      tags:
        - configuration
  tags:
    - configuration

