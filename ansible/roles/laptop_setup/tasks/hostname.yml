---
- name: Collect system serial number on macOS
  ansible.builtin.shell: |
    set -o pipefail
    system_profiler SPHardwareDataType | grep 'Serial Number' | awk '{print $NF}'
  args:
    executable: /bin/bash
  register: mac_serial_output
  check_mode: false
  changed_when: false
  when: is_macos
  tags: [always, hostname]

- name: Set system_serial_number fact
  ansible.builtin.set_fact:
    system_serial_number: "{{ mac_serial_output.stdout | trim }}"
  check_mode: false
  when: is_macos and mac_serial_output.stdout is defined
  tags: [always, hostname]

- name: Re-load laptop variables to pick up system_serial_number
  ansible.builtin.include_vars:
    file: "../../../vars/laptop.yml"
  check_mode: false
  when: is_macos
  tags: [always, hostname]

- name: Set macOS hostname
  become: true
  when: is_macos
  tags: hostname
  block:
    - name: Get current hostname settings
      ansible.builtin.shell: |
        echo "ComputerName: $(scutil --get ComputerName)"
        echo "LocalHostName: $(scutil --get LocalHostName)"
        echo "HostName: $(scutil --get HostName 2>/dev/null || echo 'not set')"
      register: current_hostname_settings
      changed_when: false
      check_mode: false

    - name: Set ComputerName
      ansible.builtin.command: "scutil --set ComputerName {{ laptop_hostname | trim }}"
      when: "('ComputerName: ' + (laptop_hostname | trim)) not in current_hostname_settings.stdout_lines"
      changed_when: true

    - name: Set LocalHostName
      ansible.builtin.command: "scutil --set LocalHostName {{ laptop_hostname | trim }}"
      when: "('LocalHostName: ' + (laptop_hostname | trim)) not in current_hostname_settings.stdout_lines"
      changed_when: true

    - name: Set HostName
      ansible.builtin.command: "scutil --set HostName {{ laptop_hostname | trim }}"
      when: "('HostName: ' + (laptop_hostname | trim)) not in current_hostname_settings.stdout_lines"
      changed_when: true
