---

- name: "Install server"
  hosts: web

  roles:
    - role: master_setup
      tags: deploy
  tasks:
    - name: Install NGINX
      ansible.builtin.include_role:
        name: nginxinc.nginx_core.nginx
        apply:
          tags:
            nginx
      tags: nginx
    - name: Prepare web directory
      ansible.builtin.file:
        path: /srv/www/farzy.org
        state: directory
        owner: www-data
        group: adm
        mode: '02775'
      tags: www
  vars_files:
    - ../vars/web.yml

- name: Install web content
  hosts: localhost
  vars_files:
    - ../vars/web.yml
  tasks:
    - name: Install personal web site with Hugo
      ansible.builtin.command:
        cmd: ./deploy
        chdir: "{{ hugo_home }}"
      changed_when: true
      tags: www
